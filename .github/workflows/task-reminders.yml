# .github/workflows/task-reminders.yml
name: Task Reminder Notifications

on:
  schedule:
    - cron: '0 8 * * *'    # 8:00 AM UTC — due today + due tomorrow
    - cron: '0 9 * * *'    # 9:00 AM UTC — overdue tasks
    - cron: '0 18 * * *'   # 6:00 PM UTC — custom evening reminder
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:

  # ── 1. Due Today ─────────────────────────────────────────────────────────────
  remind-due-today:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm install
      - name: Send due-today reminders
        run: node scripts/reminders.js due-today
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY:         ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:        ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:              ${{ secrets.VAPID_EMAIL }}

  # ── 2. Due Tomorrow ───────────────────────────────────────────────────────────
  remind-due-tomorrow:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm install
      - name: Send due-tomorrow reminders
        run: node scripts/reminders.js due-tomorrow
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY:         ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:        ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:              ${{ secrets.VAPID_EMAIL }}

  # ── 3. Overdue ────────────────────────────────────────────────────────────────
  remind-overdue:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm install
      - name: Send overdue reminders
        run: node scripts/reminders.js overdue
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY:         ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:        ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:              ${{ secrets.VAPID_EMAIL }}

  # ── 4. Evening / Custom ───────────────────────────────────────────────────────
  remind-custom:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 18 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm install
      - name: Send evening reminders
        run: node scripts/reminders.js custom
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY:         ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:        ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:              ${{ secrets.VAPID_EMAIL }}